[default]
input = $CWD
output = $CWD
case = $CASENAME
www = /global/cfs/cdirs/e3sm/www/wagmanbe/dakota/v3_pmcpu/$ENSEMBLENAME/$WWWSUBDIR/$WORKDIR
environment_commands = "source /global/common/software/e3sm/anaconda_envs/load_e3sm_unified_1.8.1_pm-cpu.sh"
dry_run=False

[climo]
active = True
walltime = "0:35:00" # This takes 5 seconds on the command line but up to 5 minutes as a parallel job.
years = "2:2:1",
#years = "2:6:5","2:11:10",
nodes = 1
input_files = "eam.h0"
frequency = "monthly"
input_subdir = "archive/atm/hist"
vars = "FSDS,FSNS,FLNS,FLDS,OCNFRAC,FSNTOA,FLUT,FSNS,FLNS,SHFLX,QFLX,TAUX,TAUY,PRECC,PRECL,PRECSC,TS,TREFHT,CLDTOT,CLDHGH,CLDMED,CLDLOW,U,V,T,PS,PSL,Z500,RH500,T500,U850,U200,SWCF,LWCF,FLNT,FSNT,Z3,RELHUM" # BMW not doing all h0 variables to save disk space.

  [[ atm_monthly_180x360_aave ]]
  mapping_file = /global/homes/z/zender/data/maps/map_ne30pg2_to_cmip6_180x360_aave.20200201.nc
  grid = "180x360_aave"
  
  [[ 24x48_aave ]]
  mapping_file = /pscratch/sd/w/wagmanbe/Autotuning-NGD/dakota_e3sm/v3_pmcpu/ne30_F2010/postproc/ne30pg2_to_24x48/map_ne30pg2_to_24x48.nc
  grid = "24x48_aave"

[ts]
active = True
walltime = "0:15:00"
years = "0002:0002:1",
#years = "0002:0006:5","0002:0011:10",

  [[ atm_monthly_180x360_aave ]]
  input_subdir = "archive/atm/hist"
  input_files = "eam.h0"
  mapping_file = /global/homes/z/zender/data/maps/map_ne30pg2_to_cmip6_180x360_aave.20200201.nc
  frequency = "monthly"
  vars = "FSNTOA,FLUT,FSNT,FLNT,FSNS,FLNS,SHFLX,QFLX,TAUX,TAUY,PRECC,PRECL,PRECSC,PRECSL,TS,TREFHT,CLDTOT,CLDHGH,CLDMED,CLDLOW,U,V,T,PS,PSL,Z500,RH500,T500,U850,U200,SWCF,LWCF,FLNT,FSNT,Z3,RELHUM"

  [[ atm_daily_180x360_aave ]]
  active = False
  input_subdir = "archive/atm/hist"
  input_files = "eam.h1"
  mapping_file = /global/homes/z/zender/data/maps/map_ne30pg2_to_cmip6_180x360_aave.20200201.nc
  frequency = "daily"
  vars = "U200,V200,FLUT,PRECT,U850,V850" 

[e3sm_diags]
active = False
walltime = "8:00:00"
years = "0002:0006:5",
#years = "0002:0006:5","0002:0011:10",
ref_start_yr = 1979
ref_final_yr = 2016
grid = '180x360_aave'

  [[ atm_monthly_180x360_aave ]]
  short_name = $SN_w_WD
  sets = 'lat_lon','zonal_mean_xy','zonal_mean_2d','polar','cosp_histogram','meridional_mean_2d','enso_diags','qbo','annual_cycle_zonal_mean','zonal_mean_2d_stratosphere'
  reference_data_path = '/global/cfs/cdirs/e3sm/e3sm_diags/obs_for_e3sm_diags/climatology/'
  obs_ts = '/global/cfs/cdirs/e3sm/e3sm_diags/obs_for_e3sm_diags/time-series'
  output_format_subplot = "pdf",

  [[ atm_monthly_180x360_aave_mvm ]]
  run_type = "model_vs_model"
  climo_subsection = "atm_monthly_180x360_aave"  # This line was key to getting model-vs-model to look for the right climo files. prevents "missing dependency" error.
  reference_data_path = '/pscratch/sd/w/wagmanbe/E3SM_simulations/dakota/v3_pmcpu/ne30_F2010/ctrl/20230802.v3alpha02.F2010.pmcpu.intel.8N/post/atm/180x360_aave/clim/'
  ref_name = '20230802.v3alpha02.F2010.pmcpu.intel.8N'
  short_ref_name = 'v3alpha02 control'
  test_name = $SN_w_WD
  short_name = $SN_w_WD
  tag = 'v3alpha02_vs_PPE'
  output_format_subplot = "pdf",
  years = "2-6",
  ref_years = "2-6",
  diff_title = 'Model - Model'

