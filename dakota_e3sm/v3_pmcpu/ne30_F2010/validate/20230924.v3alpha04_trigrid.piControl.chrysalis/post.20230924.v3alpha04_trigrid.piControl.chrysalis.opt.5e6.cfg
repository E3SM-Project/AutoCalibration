  climo_subsection = "atm_monthly_180x360_aave"
  grid = '180x360_aave'
  diff_title = "Difference"
  partition = "compute"
  qos = "regular"
  ref_final_yr = 0200
  ref_name = "20230918.v3alpha04_bigrid.piControl.chrysalis"
  ref_start_yr = 0151
  ref_years = "0101-0150",
  reference_data_path = "/lcrc/group/e3sm2/ac.golaz/E3SMv3_dev/20230918.v3alpha04_bigrid.piControl.chrysalis/post/atm/180x360_aave/clim"
