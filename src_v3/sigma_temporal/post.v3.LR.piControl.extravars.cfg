[default]
input = /lcrc/group/e3sm2/ac.golaz/E3SMv3/v3.LR.piControl
output = /lcrc/group/e3sm/ac.wagman/temporal/v3.LR.piControl
case = v3.LR.piControl
partition = compute
environment_commands = "source /lcrc/soft/climate/e3sm-unified/load_latest_e3sm_unified_chrysalis.sh"
www=''

[ts]
active = True
years = "0401:0500:10",
walltime = "00:20:00"

  [[ atm_monthly_24x48_aave ]]
  input_subdir = "archive/atm/hist"
  input_files = "eam.h0"
  frequency = "monthly"
  mapping_file = /home/ac.wagman/v3_pi_sigma/map_ne30pg2_to_24x48.nc
  vars = "Z3,RELHUM,U,T,FSNT,FLNT,PRECC,PRECL,PRECSC,PRECSL,TREFHT,SWCF,LWCF,PS,PSL"
  grid = "24x48_aave"

  [[ atm_monthly_180x360_aave ]]
  input_subdir = "archive/atm/hist"
  input_files = "eam.h0"
  frequency = "monthly"
  mapping_file =  /home/ac.zender/data/maps/map_ne30pg2_to_cmip6_180x360_aave.20200201.nc
  vars = "Z3,RELHUM,U,T,FSNT,FLNT,PRECC,PRECL,PRECSC,PRECSL,TREFHT,SWCF,LWCF,PS,PSL"
  grid = "180x360_aave"
